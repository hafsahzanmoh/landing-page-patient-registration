<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lab Patient Management System</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <style>
    :root {
      --teal-primary: #0f7f8c;
      --teal-secondary: #14919b;
      --teal-soft: #e6f7fa;
      --teal-dark: #0b5f69;
    }

    body {
      background: linear-gradient(180deg, #f4fcfd 0%, #e9f6f8 100%);
      color: #12343a;
      min-height: 100vh;
    }

    .navbar,
    .btn-primary {
      background-color: var(--teal-primary) !important;
      border-color: var(--teal-primary) !important;
    }

    .btn-primary:hover,
    .btn-primary:focus {
      background-color: var(--teal-dark) !important;
      border-color: var(--teal-dark) !important;
    }

    .card {
      border: 1px solid #cce9ed;
      box-shadow: 0 8px 20px rgba(15, 127, 140, 0.08);
    }

    .section-title {
      color: var(--teal-dark);
      font-weight: 700;
    }

    .table thead th {
      background-color: var(--teal-soft);
      color: var(--teal-dark);
      white-space: nowrap;
    }

    .page-link {
      color: var(--teal-primary);
    }

    .page-item.active .page-link {
      background-color: var(--teal-secondary);
      border-color: var(--teal-secondary);
      color: #fff;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark">
    <div class="container">
      <span class="navbar-brand mb-0 h1">Lab Patient Management System</span>
    </div>
  </nav>

  <main class="container py-4 py-md-5">
    <div class="row g-4">
      <div class="col-12 col-lg-5">
        <div class="card h-100">
          <div class="card-body p-4">
            <h2 class="h4 section-title mb-3">Register Patient</h2>
            <form class="row g-3">
              <div class="col-12">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" placeholder="Enter full name">
              </div>
              <div class="col-12 col-md-6">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="name@email.com">
              </div>
              <div class="col-12 col-md-6">
                <label for="phone" class="form-label">Phone</label>
                <input type="tel" class="form-control" id="phone" placeholder="+1 555 000 000">
              </div>
              <div class="col-12">
                <label for="address" class="form-label">Address</label>
                <input type="text" class="form-control" id="address" placeholder="Street address">
              </div>
              <div class="col-12 col-md-4">
                <label for="city" class="form-label">City</label>
                <input type="text" class="form-control" id="city">
              </div>
              <div class="col-12 col-md-4">
                <label for="state" class="form-label">State</label>
                <input type="text" class="form-control" id="state">
              </div>
              <div class="col-12 col-md-4">
                <label for="zip" class="form-label">Zip</label>
                <input type="text" class="form-control" id="zip">
              </div>
              <div class="col-12">
                <label for="country" class="form-label">Country</label>
                <input type="text" class="form-control" id="country">
              </div>
              <div class="col-12">
                <button type="button" class="btn btn-primary w-100">Submit</button>
              </div>
            </form>
          </div>
        </div>
      </div>
      <!-- table -->
      <div>
        <h1>TABLE</h1>
      </div>
      <div class="col-12 col-lg-7">
        <div class="card h-100">
          <div class="card-body p-4">
            <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-2 mb-3">
              <h2 class="h4 section-title m-0">Manage Users</h2>
              <small class="text-muted" id="recordInfo"></small>
            </div>

            <div class="table-responsive">
              <table class="table table-hover align-middle mb-3">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>City</th>
                  </tr>
                </thead>
                <tbody id="userTableBody"></tbody>
              </table>
            </div>

            <nav aria-label="User table pagination">
              <ul class="pagination pagination-sm flex-wrap mb-0" id="pagination"></ul>
            </nav>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const users = Array.from({ length: 235 }, (_, index) => {
      const id = index + 1;
      return {
        id,
        name: "User " + id,
        email: "user" + id + "@example.com",
        phone: "+1 555 01" + String(id).padStart(3, "0"),
        city: ["New York", "Chicago", "Austin", "Seattle", "Boston"][index % 5]
      };
    });

    const recordsPerPage = 50;
    let currentPage = 1;

    const tableBody = document.getElementById("userTableBody");
    const pagination = document.getElementById("pagination");
    const recordInfo = document.getElementById("recordInfo");

    function renderTable(page) {
      const start = (page - 1) * recordsPerPage;
      const end = start + recordsPerPage;
      const pageUsers = users.slice(start, end);

      tableBody.innerHTML = pageUsers.map((user) => (
        "<tr>" +
          "<td>" + user.id + "</td>" +
          "<td>" + user.name + "</td>" +
          "<td>" + user.email + "</td>" +
          "<td>" + user.phone + "</td>" +
          "<td>" + user.city + "</td>" +
        "</tr>"
      )).join("");

      const rangeEnd = Math.min(end, users.length);
      recordInfo.textContent = "Showing " + (start + 1) + "-" + rangeEnd + " of " + users.length + " users";
    }

    function renderPagination() {
      const pageCount = Math.ceil(users.length / recordsPerPage);
      pagination.innerHTML = "";

      for (let page = 1; page <= pageCount; page += 1) {
        const li = document.createElement("li");
        li.className = "page-item" + (page === currentPage ? " active" : "");

        const button = document.createElement("button");
        button.className = "page-link";
        button.type = "button";
        button.textContent = String(page);
        button.addEventListener("click", () => {
          currentPage = page;
          renderTable(currentPage);
          renderPagination();
        });

        li.appendChild(button);
        pagination.appendChild(li);
      }
    }

    renderTable(currentPage);
    renderPagination();
  </script>
</body>
</html>
